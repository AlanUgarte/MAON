services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_password}
      POSTGRES_DB: ${POSTGRES_DB:-crm_comercial}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-crm}:${POSTGRES_PASSWORD:-crm_password}@db:5432/${POSTGRES_DB:-crm_comercial}?schema=public"
      PORT: 4000
      CORS_ORIGIN: "http://localhost:3000"
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      JWT_EXPIRES_IN: 7d
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-claude-haiku-4-5-20251001}
      AI_ENABLED: ${AI_ENABLED:-false}
      AUTO_REPLY_ENABLED: ${AUTO_REPLY_ENABLED:-false}
      AI_ANALYSIS_ENABLED: ${AI_ANALYSIS_ENABLED:-true}
      FREE_WINDOW_ONLY: ${FREE_WINDOW_ONLY:-true}
      STOCK_CONTROL_ENABLED: ${STOCK_CONTROL_ENABLED:-false}
      WHATSAPP_TOKEN: ${WHATSAPP_TOKEN:-}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID:-}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN:-mi-token-de-verificacion}
      WHATSAPP_API_VERSION: ${WHATSAPP_API_VERSION:-v21.0}
      META_ACCESS_TOKEN: ${META_ACCESS_TOKEN:-}
    ports:
      - "4000:4000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:4000/api"
    ports:
      - "3000:3000"

volumes:
  pgdata:
